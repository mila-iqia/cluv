[project]
name = "cluv"
description = "cluv (from 'cluster' + 'uv') - A versatile tool to work with uv python projects across HPC clusters."
readme = "README.md"
authors = [{ name = "Fabrice Normandin", email = "normandf@mila.quebec" }]
requires-python = ">=3.13"
dynamic = ["version"]
dependencies = [
    "milatools>=0.1.9",
    "rich>=13.0",
    "rich-argparse>=1.7.2",
    "simple-parsing>=0.1.8",
]

[project.scripts]
cluv = "cluv.__main__:main"


[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "uv-dynamic-versioning>=0.2.0",
    "mkdocs<2.0.0",
    "mkdocs-material>=9.5.44",
    "mkdocstrings[python]>=0.27.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-timeout>=2.3.1",
]

[tool.pytest.ini_options]
testpaths = ["cluv", "tests"]
norecursedirs = [".venv"]
addopts = ["--doctest-modules"]

[tool.uv]
managed = true


[tool.uv-dynamic-versioning]
vcs = "git"
style = "semver"

[tool.ruff]
line-length = 99

[tool.docformatter]
wrap-summaries = 99
wrap-descriptions = 99

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cluv"]

[tool.hatch.version]
source = "uv-dynamic-versioning"
