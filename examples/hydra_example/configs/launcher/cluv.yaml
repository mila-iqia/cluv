# @package _global_
defaults:
  - override /hydra/launcher: cluv_launcher
  # - override /hydra/sweeper: cluv_sweeper

hydra:
  run:
    # output directory, generated dynamically on each run
    dir: ${cluv:results_path,logs/${hydra.job.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}}
  sweep:
    dir: ${cluv:results_path,logs/${hydra.job.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}}
    subdir: ${hydra.job.num}

  launcher:
    # NEW ARGUMENTS for cluv:
    cluster: mila
    vram_gb: 10
    # Usual submitit arguments:
    stderr_to_stdout: true
    timeout_min: 60
    gpus_per_node: 1
    cpus_per_task: 2
    mem_gb: 16
