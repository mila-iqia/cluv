# https://hydra.cc/docs/configure_hydra/intro/

# Copied from https://github.com/ashleve/lightning-hydra-template/blob/9e7089ce70dac66096576c6596e966d4c38cbdce/configs/hydra/default.yaml

# enable color logging
defaults:
  - override hydra_logging: colorlog
  - override job_logging: colorlog

run:
  dir: logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
sweep:
  dir: logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  subdir: ${hydra.job.num}
  # TODO: This is in their docs, but doesn't work!
  # subdir: '${hydra_override_dirname:{exclude_keys: [seed]}}/seed=${seed}'

job_logging:
  handlers:
    rich:
      class: rich.logging.RichHandler
      markup: True
      rich_tracebacks: True
  root:
    handlers: [rich]
  disable_existing_loggers: False

hydra_logging:
  handlers:
    rich:
      class: rich.logging.RichHandler
      markup: True
      rich_tracebacks: True
  root:
    handlers: [rich]
  disable_existing_loggers: False
