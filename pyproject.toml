[project]
name = "cluv"
description = "cluv (from 'cluster' + 'uv') - A versatile tool to work with uv python projects across HPC clusters."
readme = "README.md"
authors = [{ name = "Fabrice Normandin", email = "normandf@mila.quebec" }]
requires-python = ">=3.13"
dynamic = ["version"]
dependencies = [
    "milatools>=0.1.9",
    "rich>=13.0",
    "rich-argparse>=1.7.2",
    "simple-parsing>=0.1.8",
]

[project.scripts]
cluv = "cluv.__main__:main"


[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "uv-dynamic-versioning>=0.2.0",
    "mkdocs<2.0.0",
    "mkdocs-material>=9.5.44",
    "mkdocstrings[python]>=0.27.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-timeout>=2.3.1",
]

[tool.pytest.ini_options]
testpaths = ["cluv", "tests"]
norecursedirs = [".venv"]
addopts = ["--doctest-modules"]
asyncio_mode = "auto"
timeout = 10
markers = [
    "integration: requires live SSH connections to real clusters (deselect with '-m not integration')",
]

[tool.uv]
managed = true


[tool.uv-dynamic-versioning]
vcs = "git"
style = "semver"

[tool.ruff]
line-length = 99

[tool.docformatter]
wrap-summaries = 99
wrap-descriptions = 99

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cluv"]

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.coverage.run]
source = ["cluv"]

[tool.coverage.report]
show_missing = true

[tool.cluv]
# IDEA: either the job script is set here, or passed as a positional argument (after the cluster)
# OR, leave it as a required positional argument. More explicit.
job_script = "scripts/job.sh"

[tool.cluv.slurm]
# Global SBATCH_* defaults applied to all clusters.
SBATCH_TIME = "3:00:00"
SBATCH_REQUE = true

[tool.cluv.clusters.mila]
SBATCH_PARTITION = "long"

[tool.cluv.clusters.rorqual]
SBATCH_ACCOUNT = "def-bengioy"
SBATCH_PARTITION = "main"
UV_OFFLINE = 1

[tool.cluv.clusters.tamia]
