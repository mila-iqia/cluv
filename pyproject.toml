[project]
name = "cluv"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "milatools>=0.1.9",
    "rich>=13.0",
    "rich-argparse>=1.7.2",
    "simple-parsing>=0.1.8",
]
dynamic = ["version"]

[tool.uv]
package = true

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-timeout>=2.3.1",
]

[tool.hatch.build.targets.wheel]
packages = ["cluv"]

[tool.hatch.version]
source = "uv-dynamic-versioning"

[project.scripts]
cluv = "cluv.__main__:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 10
markers = [
    "integration: requires live SSH connections to real clusters (deselect with '-m not integration')",
]

[tool.coverage.run]
source = ["cluv"]

[tool.coverage.report]
show_missing = true

[tool.cluv]
# Trimmed to two clusters for development/testing. Uncomment the rest when stable.
clusters = [
    "mila",
    "tamia",
    "rorqual",
    # "fir",
    # "fir",
    # "nibi",
    # "killarney",
    # "vulcan",
    # "trillium",
    # "trillium-gpu",
]
